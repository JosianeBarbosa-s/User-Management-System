<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Cadastro</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="layout">

    <div class="left">
      <h1>Cadastro</h1>

      <form id="form" novalidate>
        <input type="hidden" id="id">

        <div class="field">
          <input type="text" id="nome" placeholder="Nome">
          <small class="erro" id="erro-nome"></small>
        </div>

        <div class="field">
          <input type="email" id="email" placeholder="Email">
          <small class="erro" id="erro-email"></small>
        </div>

        <div class="field">
          <input type="text" id="telefone" placeholder="Telefone">
          <small class="erro" id="erro-telefone"></small>
        </div>

        <button class="btn" type="submit">Salvar</button>
      </form>

      <div class="top-bar">
        <input type="text" id="busca" class="search" placeholder="Buscar usuário...">
        <span id="contador"></span>
      </div>

      <div id="toast" class="toast"></div>

      <table>
        <thead>
          <tr>
            <th>Nome</th>
            <th>Email</th>
            <th>Telefone</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="tabela"></tbody>
      </table>
    </div>

    <div class="right">
      <h2>USER MANAGEMENT SYSTEM</h2>
      <p>Gerencie informações de usuários com praticidade, segurança e organização.</p>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
